<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HealthNexus</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <section id="view-login" class="view-section">
        <div class="login-container">
            <div class="login-box premium-login-box">
                <div class="login-switcher">
                    <button class="switch-btn active" id="btnSwitchHospital"
                        onclick="app.switchLogin('hospital')">Hospital</button>
                    <button class="switch-btn" id="btnSwitchPatient"
                        onclick="app.switchLogin('patient')">Patient</button>
                </div>

                <!-- Hospital Login Form -->
                <form id="formHospitalLogin" onsubmit="event.preventDefault(); app.login('hospital');"
                    class="auth-form active">
                    <h2><i class="fa-solid fa-hospital"></i> Hospital Portal</h2>
                    <p>Access patient records and hospital management.</p>
                    <div class="input-group">
                        <label>Hospital ID / Email</label>
                        <input type="text" placeholder="admin@hospital.com" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-primary w-100">Login to Dashboard</button>
                </form>

                <!-- Patient Login Form -->
                <form id="formPatientLogin" onsubmit="event.preventDefault(); app.login('patient');"
                    class="auth-form hidden">
                    <h2><i class="fa-solid fa-user"></i> Patient Portal</h2>
                    <p>Track your health, appointments, and vitals.</p>
                    <div class="input-group">
                        <label>Patient ID / Email</label>
                        <input type="text" placeholder="patient@nexus.com" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-secondary w-100">Access My Health</button>
                </form>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="components.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            components.renderNavbar('login');
            components.renderFooter();
            app.initAnimations();
            app.initPillNav();
        });
    </script>
</body>
</html>
